<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defense News Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem 1rem; }
    header { max-width: 720px; margin: 0 auto 2rem; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; }
    .fetched { font-size: 12px; color: #aaa; margin-top: 6px; }
    .topic { max-width: 720px; margin: 0 auto 2.5rem; }
    .topic h2 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 0.5px solid #ddd; }
    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card { background: white; border: 0.5px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; }
    .card-source { font-size: 12px; color: #888; margin-bottom: 6px; }
    .card-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    .card-title a { color: #1a1a1a; text-decoration: none; }
    .card-title a:hover { color: #0066cc; }
    .card-summary { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 8px; }
    .card-date { font-size: 12px; color: #aaa; }
    .no-articles { color: #888; font-size: 14px; padding: 1rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>Defense News Tracker</h1>
    <p class="subtitle">Latest global defense and security news</p>
    <p class="fetched" id="fetched"></p>
  </header>
  <div id="content"></div>
  <script>
    fetch('news.json')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById('fetched').textContent = 'Last updated: ' + data.fetched_at + ' — run fetch_news.py to refresh';
        var html = '';
        data.topics.forEach(function(topic) {
          html += '<div class="topic"><h2>' + topic.title + '</h2><div class="cards">';
          if (topic.articles.length === 0) {
            html += '<p class="no-articles">No articles found.</p>';
          } else {
            topic.articles.forEach(function(a) {
              html += '<div class="card">';
              html += '<div class="card-source">' + a.source.name + '</div>';
              html += '<div class="card-title"><a href="' + a.url + '" target="_blank">' + a.title + '</a></div>';
              html += '<div class="card-summary">' + (a.description || '') + '</div>';
              html += '<div class="card-date">' + a.publishedAt.slice(0, 10) + '</div>';
              html += '</div>';
            });
          }
          html += '</div></div>';
        });
        document.getElementById('content').innerHTML = html;
      })
      .catch(function() {
        document.getElementById('content').innerHTML = '<p style="color:#888;text-align:center;padding:2rem;">Run fetch_news.py first to load articles.</p>';
      });
  </script>
</body>
</html>
